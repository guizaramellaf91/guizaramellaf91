<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="45%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.06" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="980" cy="60" r="120" fill="url(#glow)"/>
  <circle cx="180" cy="260" r="90" fill="url(#glow)"/>

  <!-- Code brackets -->
  <text x="80" y="175" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="72" font-weight="700" fill="url(#accent)" opacity="0.35">&lt;/&gt;</text>

  <!-- Main title -->
  <text x="80" y="118" font-family="Segoe UI, system-ui, sans-serif" font-size="46" font-weight="700" fill="#f0f6fc">Guilherme Ramella</text>
  <text x="80" y="162" font-family="Segoe UI, system-ui, sans-serif" font-size="22" fill="#8b949e">Desenvolvedor de Software · 10+ anos em tecnologia</text>

  <!-- Accent line -->
  <rect x="80" y="188" width="180" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="228" font-family="Segoe UI, system-ui, sans-serif" font-size="16" fill="#c9d1d9">Backend · Frontend · DevOps · Dados</text>

  <!-- Tech dots -->
  <g transform="translate(80, 252)">
    <circle cx="0" cy="0" r="6" fill="#239120"/>
    <circle cx="24" cy="0" r="6" fill="#007396"/>
    <circle cx="48" cy="0" r="6" fill="#f7df1e"/>
    <circle cx="72" cy="0" r="6" fill="#3178c6"/>
    <circle cx="96" cy="0" r="6" fill="#3776ab"/>
    <circle cx="120" cy="0" r="6" fill="#dea584"/>
    <circle cx="144" cy="0" r="6" fill="#61dafb"/>
    <circle cx="168" cy="0" r="6" fill="#2496ed"/>
  </g>

  <!-- Right side decorative terminal -->
  <g transform="translate(780, 72)">
    <rect width="340" height="176" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="0" width="340" height="36" rx="12" fill="#21262d"/>
    <rect x="0" y="24" width="340" height="12" fill="#21262d"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="24" y="72" font-family="ui-monospace, monospace" font-size="14" fill="#79c0ff">const dev = {</text>
    <text x="40" y="96" font-family="ui-monospace, monospace" font-size="14" fill="#a5d6ff">  experience: "10+ years",</text>
    <text x="40" y="120" font-family="ui-monospace, monospace" font-size="14" fill="#a5d6ff">  passion: "building software",</text>
    <text x="40" y="144" font-family="ui-monospace, monospace" font-size="14" fill="#a5d6ff">  stack: ["C#", "Java", "Rust", ...]</text>
    <text x="24" y="168" font-family="ui-monospace, monospace" font-size="14" fill="#79c0ff">};</text>
  </g>
</svg>
